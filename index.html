<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마테마티카</title>
  <link rel="stylesheet" href="style.css?v=20260321-11">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1 class="glitch" data-text="마테마티카">마테마티카</h1>
        <p class="hero-subtitle">MATHEMATICAL ARCHIVES & COLLECTIONS</p>
        <nav class="page-nav" aria-label="Section navigation">
          <button class="page-tab is-active" type="button" data-page-target="opening" aria-pressed="true">Card Opening</button>
          <button class="page-tab" type="button" data-page-target="catalog">Master Catalog</button>
        </nav>
      </div>
    </header>

    <main class="page-stack" id="pageStack" data-page="opening">
      <section class="page-view is-active" data-page="opening" aria-label="Pack Opening page">
        <section class="panel pack-panel">
        <div class="panel-header">
          <h2 class="panel-title">PACK OPENING</h2>
          <button id="newPackButton" class="action-button glow-button" type="button">New Pack</button>
        </div>

        <div class="opening-stage">
          <div class="opening-header">
            <h3 id="openingTitle" class="neon-text"></h3>
            <p id="revealMessage" class="sub-text"></p>
          </div>
          <div id="cardStage" class="card-stage">
            <div class="stage-light"></div>
            <div class="stage-ring"></div>
            <div class="stage-veil"></div>
            <button id="ripPackButton" class="booster-pack" type="button" aria-label="Rip the booster pack">
              <span class="pack-contents" aria-hidden="true">
                <span class="pack-card pack-card-center"></span>
              </span>
              <span class="pack-body" aria-hidden="true"></span>
              <span class="pack-top" aria-hidden="true"></span>
              <span class="pack-top-label">Museum Edition</span>
              <span class="pack-center-glyph"></span>
              <span class="pack-logo">FORMULA<br>RELICS</span>
              <span class="pack-bottom-copy">Drag or click to rip</span>
            </button>
            <div id="spreadFan" class="spread-fan"></div>
          </div>
          <div class="rip-instructions hidden" id="ripInstructions"></div>
        </div>
        </section>
      </section>

      <section class="page-view" data-page="catalog" aria-label="Master Catalog page" hidden>
        <section class="rarity-summary" aria-label="Owned cards by rarity">
          <div class="rarity-summary-card bronze">
            <span>Bronze</span>
            <strong id="bronzeCount">0</strong>
          </div>
          <div class="rarity-summary-card silver">
            <span>Silver</span>
            <strong id="silverCount">0</strong>
          </div>
          <div class="rarity-summary-card gold">
            <span>Gold</span>
            <strong id="goldCount">0</strong>
          </div>
          <div class="rarity-summary-card platinum">
            <span>Platinum</span>
            <strong id="platinumCount">0</strong>
          </div>
          <div class="rarity-summary-card legendary">
            <span>Legendary</span>
            <strong id="summaryLegendaryCount">0</strong>
          </div>
        </section>

        <section class="panel catalog-panel">
        <div class="panel-header">
          <h2 class="panel-title">COLLECTED CARDS</h2>
          <div class="legend-row">
            <span class="rarity-chip bronze">Bronze</span>
            <span class="rarity-chip silver">Silver</span>
            <span class="rarity-chip gold">Gold</span>
            <span class="rarity-chip platinum">Platinum</span>
            <span class="rarity-chip legendary">Legendary</span>
          </div>
        </div>
        <div id="catalogGrid" class="catalog-grid"></div>
        <p id="catalogEmptyState" class="empty-state hidden">아직 뽑은 카드가 없습니다. Pack Opening에서 먼저 카드를 열어보세요.</p>
        </section>
      </section>
    </main>
  </div>

  <div id="cardModal" class="card-modal hidden" aria-hidden="true">
    <div class="card-modal-backdrop" data-close-modal="true"></div>
    <div class="card-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="closeModalButton" class="card-modal-close" type="button" aria-label="Close details">×</button>
      <div class="card-modal-layout">
        <div class="card-modal-visual">
          <div id="modalCard3d" class="modal-card-3d"></div>
        </div>
        <div class="card-modal-info">
          <p class="modal-kicker">Relic Status</p>
          <h3 id="modalTitle"></h3>
          <div class="modal-badges">
            <span id="modalRarity" class="rarity-chip"></span>
            <span id="modalScore" class="modal-score"></span>
          </div>
          <div class="modal-meta-grid">
            <div>
              <span class="meta-label">Discoverer</span>
              <strong id="modalDiscoverer"></strong>
            </div>
            <div>
              <span class="meta-label">Year</span>
              <strong id="modalYear"></strong>
            </div>
            <div>
              <span class="meta-label">Formula</span>
              <strong id="modalFormula" class="mono"></strong>
            </div>
          </div>
          <div class="modal-section">
            <h4>Origin</h4>
            <p id="modalOrigin"></p>
          </div>
          <div class="modal-section">
            <h4>Core Idea</h4>
            <p id="modalCore"></p>
          </div>
          <div class="modal-section">
            <h4>4 Metrics</h4>
            <div id="modalStats" class="modal-stats"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <template id="cardTemplate">
    <article class="tcg-card" tabindex="0" role="button" aria-label="Flip card">
      <div class="card-inner">
        <div class="card-face card-face-front">
          <div class="card-foil"></div>
          <div class="card-frame">
            <div class="card-header">
              <span class="card-rarity-code"></span>
              <h3 class="card-name"></h3>
            </div>
            
            <div class="card-formula-bar">
              <p class="card-formula-display"></p>
            </div>

            <div class="card-art-window">
              <div class="card-art-image"></div>
              <div class="art-overlay"></div>
              <div class="formula-sigil-anim"></div>
              <div class="card-meta-overlay">
                <span class="card-discoverer"></span>
                <span class="card-year"></span>
              </div>
            </div>

            <div class="card-stat-grid">
              <div class="card-stat-row"></div>
              <div class="card-flavor"></div>
            </div>
          </div>
        </div>

        <div class="card-face card-face-back" aria-hidden="true">
          <div class="card-back-image"></div>
          <div class="card-back-glow"></div>
        </div>
      </div>
    </article>
  </template>

  <script src="script.js?v=20260321-11"></script>
</body>
</html>
